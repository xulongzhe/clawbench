name: Feature 请求
description: 建议新功能或改进
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你遇到的问题
      description: 描述什么场景下缺少这个功能
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案

  - type: dropdown
    id: area
    attributes:
      label: 涉及模块
      options:
        - 后端 (Go)
        - 前端 (Vue)
        - Android 原生
        - CI / 构建
        - 文档
        - 其他
    validations:
      required: true
