name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  golangci-lint:
    name: Lint (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m

  test:
    name: Test & Coverage Gate
    needs: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Go coverage gate
        run: ./scripts/check-go-coverage.sh

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Frontend coverage gate
        run: ./scripts/check-frontend-coverage.sh

  build-frontend:
    name: Build Frontend
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Build frontend
        run: npm ci && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: public
          path: public/

  build-linux:
    name: Build Linux amd64
    needs: build-frontend
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: public
          path: public/

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Linux binary
        env:
          CGO_ENABLED: 1
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          go build -ldflags="-s -w -X clawbench/internal/version.Version=$VERSION" -o clawbench-linux ./cmd/server
          echo "Built with CGO_ENABLED=1: dynamically linked, DuckDB/RAG enabled"

      - name: Verify Linux binary
        run: |
          file clawbench-linux
          ldd clawbench-linux

      - name: Download Pi binary (embedded agent for setup wizard)
        env:
          PI_VERSION: "0.78.0"
        run: |
          PI_URL="https://github.com/earendil-works/pi/releases/download/v${PI_VERSION}/pi-linux-x64.tar.gz"
          mkdir -p .clawbench/pi
          curl -sL "$PI_URL" | tar xzf - -C .clawbench/pi --strip-components=1
          chmod +x .clawbench/pi/pi
          echo "$PI_VERSION" > .clawbench/pi/VERSION
          echo "Pi v${PI_VERSION} downloaded"

      - name: Package Linux
        run: |
          mkdir -p pkg-linux/clawbench
          cp clawbench-linux pkg-linux/clawbench/clawbench
          cp -r public pkg-linux/clawbench/public
          cp -r config pkg-linux/clawbench/config
          mkdir -p pkg-linux/clawbench/.clawbench
          cp -r .clawbench/pi pkg-linux/clawbench/.clawbench/pi
          chmod +x pkg-linux/clawbench/clawbench
          cd pkg-linux && zip -r clawbench-linux-amd64.zip clawbench/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: pkg-linux/clawbench-linux-amd64.zip

  build-windows:
    name: Build Windows amd64
    needs: build-frontend
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: public
          path: public/

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Windows binary
        env:
          CGO_ENABLED: 1
        run: |
          $VERSION = if (git describe --tags --always 2>$null) { git describe --tags --always } else { "dev" }
          go build -ldflags="-s -w -X clawbench/internal/version.Version=$VERSION" -o clawbench.exe ./cmd/server

      - name: Download Pi binary (embedded agent for setup wizard)
        shell: pwsh
        env:
          PI_VERSION: "0.78.0"
        run: |
          $PI_URL = "https://github.com/earendil-works/pi/releases/download/v${env:PI_VERSION}/pi-windows-x64.zip"
          New-Item -ItemType Directory -Force -Path .clawbench\pi
          $tmpZip = "$env:TEMP\pi-download.zip"
          Invoke-WebRequest -Uri $PI_URL -OutFile $tmpZip
          Expand-Archive -Path $tmpZip -DestinationPath .clawbench\pi -Force
          Remove-Item $tmpZip -Force
          Set-Content -Path ".clawbench\pi\VERSION" -Value $env:PI_VERSION
          Write-Host "Pi v${env:PI_VERSION} downloaded"

      - name: Package Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path pkg-windows/clawbench
          Copy-Item clawbench.exe pkg-windows/clawbench/
          Copy-Item -Recurse public pkg-windows/clawbench/public
          Copy-Item -Recurse config pkg-windows/clawbench/config
          New-Item -ItemType Directory -Force -Path pkg-windows/clawbench/.clawbench
          Copy-Item -Recurse .clawbench/pi pkg-windows/clawbench/.clawbench/pi
          Compress-Archive -Path pkg-windows/clawbench -DestinationPath pkg-windows/clawbench-windows-amd64.zip

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: pkg-windows/clawbench-windows-amd64.zip

  build-macos-arm64:
    name: Build macOS arm64
    needs: build-frontend
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: public
          path: public/

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build macOS arm64 binary
        env:
          CGO_ENABLED: 1
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          go build -ldflags="-s -w -X clawbench/internal/version.Version=$VERSION" -o clawbench-darwin-arm64 ./cmd/server

      - name: Download Pi binary (embedded agent for setup wizard)
        env:
          PI_VERSION: "0.78.0"
        run: |
          PI_URL="https://github.com/earendil-works/pi/releases/download/v${PI_VERSION}/pi-darwin-arm64.tar.gz"
          mkdir -p .clawbench/pi
          curl -sL "$PI_URL" | tar xzf - -C .clawbench/pi --strip-components=1
          chmod +x .clawbench/pi/pi
          echo "$PI_VERSION" > .clawbench/pi/VERSION
          echo "Pi v${PI_VERSION} downloaded"

      - name: Package macOS arm64
        run: |
          mkdir -p pkg-mac-arm64/clawbench
          cp clawbench-darwin-arm64 pkg-mac-arm64/clawbench/clawbench
          cp -r public pkg-mac-arm64/clawbench/public
          cp -r config pkg-mac-arm64/clawbench/config
          mkdir -p pkg-mac-arm64/clawbench/.clawbench
          cp -r .clawbench/pi pkg-mac-arm64/clawbench/.clawbench/pi
          chmod +x pkg-mac-arm64/clawbench/clawbench
          cd pkg-mac-arm64 && zip -r clawbench-darwin-arm64.zip clawbench/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: pkg-mac-arm64/clawbench-darwin-arm64.zip

  build-macos-amd64:
    name: Build macOS amd64
    needs: build-frontend
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: public
          path: public/

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build macOS amd64 binary (cross-compile on arm64)
        env:
          CGO_ENABLED: 1
          GOARCH: amd64
          CC: clang -target x86_64-apple-macos13.0
          CXX: clang++ -target x86_64-apple-macos13.0
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          go build -ldflags="-s -w -X clawbench/internal/version.Version=$VERSION" -o clawbench-darwin-amd64 ./cmd/server

      - name: Download Pi binary (embedded agent for setup wizard)
        env:
          PI_VERSION: "0.78.0"
        run: |
          PI_URL="https://github.com/earendil-works/pi/releases/download/v${PI_VERSION}/pi-darwin-x64.tar.gz"
          mkdir -p .clawbench/pi
          curl -sL "$PI_URL" | tar xzf - -C .clawbench/pi --strip-components=1
          chmod +x .clawbench/pi/pi
          echo "$PI_VERSION" > .clawbench/pi/VERSION
          echo "Pi v${PI_VERSION} downloaded"

      - name: Package macOS amd64
        run: |
          mkdir -p pkg-mac-amd64/clawbench
          cp clawbench-darwin-amd64 pkg-mac-amd64/clawbench/clawbench
          cp -r public pkg-mac-amd64/clawbench/public
          cp -r config pkg-mac-amd64/clawbench/config
          mkdir -p pkg-mac-amd64/clawbench/.clawbench
          cp -r .clawbench/pi pkg-mac-amd64/clawbench/.clawbench/pi
          chmod +x pkg-mac-amd64/clawbench/clawbench
          cd pkg-mac-amd64 && zip -r clawbench-darwin-amd64.zip clawbench/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: pkg-mac-amd64/clawbench-darwin-amd64.zip

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/clawbench.jks

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_FILE: ../clawbench.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          VERSION_NAME=$(git describe --tags --always 2>/dev/null || echo "dev")
          ./gradlew assembleRelease -PversionCode=$VERSION_CODE -PversionName=$VERSION_NAME

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: |
            android/app/build/outputs/apk/release/clawbench-android.apk

  release-notes:
    name: Generate Release Notes
    needs: [build-linux, build-windows, build-macos-arm64, build-macos-amd64, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Upload install scripts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release upload "$TAG" install.sh --clobber

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, generating default notes"
            gh release edit "$TAG" --generate-notes
            exit 0
          fi

          NOTES=""

          # Helper: extract categorized commits with hashes
          # Format: "hash subject" — strip conventional prefix for display

          # 🚀 Features
          FEATS=$(git log "${PREV_TAG}..${TAG}" --format="%h %s" | grep -iE "^[0-9a-f]+ (feat|feature)\b" || true)
          if [ -n "$FEATS" ]; then
            NOTES="${NOTES}## 🚀 新特性\n\n"
            while IFS= read -r line; do
              HASH=$(echo "$line" | cut -d' ' -f1)
              DESC=$(echo "$line" | sed -E 's/^[0-9a-f]+ (feat|feature)(\(.+\))?:\s*//')
              NOTES="${NOTES}- ${DESC} (${HASH})\n"
            done <<< "$FEATS"
            NOTES="${NOTES}\n"
          fi

          # 🐛 Bug Fixes
          FIXES=$(git log "${PREV_TAG}..${TAG}" --format="%h %s" | grep -iE "^[0-9a-f]+ fix\b" || true)
          if [ -n "$FIXES" ]; then
            NOTES="${NOTES}## 🐛 问题修复\n\n"
            while IFS= read -r line; do
              HASH=$(echo "$line" | cut -d' ' -f1)
              DESC=$(echo "$line" | sed -E 's/^[0-9a-f]+ fix(\(.+\))?:\s*//')
              NOTES="${NOTES}- 修复了 ${DESC} (${HASH})\n"
            done <<< "$FIXES"
            NOTES="${NOTES}\n"
          fi

          # ⚡ Performance
          PERFS=$(git log "${PREV_TAG}..${TAG}" --format="%h %s" | grep -iE "^[0-9a-f]+ perf\b" || true)
          if [ -n "$PERFS" ]; then
            NOTES="${NOTES}## ⚡ 性能优化\n\n"
            while IFS= read -r line; do
              HASH=$(echo "$line" | cut -d' ' -f1)
              DESC=$(echo "$line" | sed -E 's/^[0-9a-f]+ perf(\(.+\))?:\s*//')
              NOTES="${NOTES}- ${DESC} (${HASH})\n"
            done <<< "$PERFS"
            NOTES="${NOTES}\n"
          fi

          # 🔧 Internal
          INTERNAL=$(git log "${PREV_TAG}..${TAG}" --format="%h %s" | grep -iE "^[0-9a-f]+ (refactor|chore|style|ci|build)\b" || true)
          if [ -n "$INTERNAL" ]; then
            NOTES="${NOTES}## 🔧 内部改进\n\n"
            COUNT=$(echo "$INTERNAL" | wc -l)
            NOTES="${NOTES}- ${COUNT} 项内部改进（重构、依赖更新、代码风格等）\n\n"
          fi

          # 💥 Breaking Changes
          BREAKING=$(git log "${PREV_TAG}..${TAG}" --format="%B" | grep -i "BREAKING CHANGE" || true)
          if [ -n "$BREAKING" ]; then
            NOTES="${NOTES}## 💥 破坏性变更\n\n"
            NOTES="${NOTES}${BREAKING}\n\n"
          fi

          NOTES="${NOTES}---\n\n**完整变更日志**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}\n"

          # Write notes to file and update release
          printf '%b\n' "$NOTES" > /tmp/release-notes.md
          gh release edit "$TAG" --notes-file /tmp/release-notes.md
