name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Release Package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Build frontend
        run: npm ci && npm run build

      - name: Build Linux binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o clawbench-linux-amd64 ./cmd/server

      - name: Build Windows binary
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o clawbench-windows-amd64.exe ./cmd/server

      - name: Package Linux release
        run: |
          mkdir -p release/clawbench
          cp clawbench-linux-amd64 release/clawbench/
          cp -r public release/clawbench/public
          cp config.docker.yaml release/clawbench/config.example.yaml
          cp -r agents release/clawbench/agents
          cp server.sh release/clawbench/
          chmod +x release/clawbench/clawbench-linux-amd64 release/clawbench/server.sh
          cd release && zip -r clawbench-linux-amd64.zip clawbench/

      - name: Package Windows release
        run: |
          mkdir -p release-win/clawbench
          cp clawbench-windows-amd64.exe release-win/clawbench/
          cp -r public release-win/clawbench/public
          cp config.docker.yaml release-win/clawbench/config.example.yaml
          cp -r agents release-win/clawbench/agents
          cp server.ps1 release-win/clawbench/
          cd release-win && zip -r clawbench-windows-amd64.zip clawbench/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/clawbench-linux-amd64.zip
            release-win/clawbench-windows-amd64.zip
