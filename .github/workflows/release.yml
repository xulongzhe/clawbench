name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Build frontend
        run: npm ci && npm run build

      - name: Build Linux binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o clawbench-linux ./cmd/server

      - name: Build Windows binary
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o clawbench.exe ./cmd/server

      - name: Build macOS arm64 binary
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o clawbench-darwin-arm64 ./cmd/server

      - name: Build macOS amd64 binary
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o clawbench-darwin-amd64 ./cmd/server

      - name: Package Linux
        run: |
          mkdir -p pkg-linux/clawbench
          cp clawbench-linux pkg-linux/clawbench/clawbench
          cp -r public pkg-linux/clawbench/public
          cp -r config pkg-linux/clawbench/config
          cp server.sh pkg-linux/clawbench/
          chmod +x pkg-linux/clawbench/clawbench pkg-linux/clawbench/server.sh
          cd pkg-linux && zip -r clawbench-linux-amd64.zip clawbench/

      - name: Package Windows
        run: |
          mkdir -p pkg-windows/clawbench
          cp clawbench.exe pkg-windows/clawbench/
          cp -r public pkg-windows/clawbench/public
          cp -r config pkg-windows/clawbench/config
          cp server.ps1 pkg-windows/clawbench/
          cd pkg-windows && zip -r clawbench-windows-amd64.zip clawbench/

      - name: Package macOS arm64
        run: |
          mkdir -p pkg-mac-arm64/clawbench
          cp clawbench-darwin-arm64 pkg-mac-arm64/clawbench/clawbench
          cp -r public pkg-mac-arm64/clawbench/public
          cp -r config pkg-mac-arm64/clawbench/config
          cp server.sh pkg-mac-arm64/clawbench/
          chmod +x pkg-mac-arm64/clawbench/clawbench pkg-mac-arm64/clawbench/server.sh
          cd pkg-mac-arm64 && zip -r clawbench-darwin-arm64.zip clawbench/

      - name: Package macOS amd64
        run: |
          mkdir -p pkg-mac-amd64/clawbench
          cp clawbench-darwin-amd64 pkg-mac-amd64/clawbench/clawbench
          cp -r public pkg-mac-amd64/clawbench/public
          cp -r config pkg-mac-amd64/clawbench/config
          cp server.sh pkg-mac-amd64/clawbench/
          chmod +x pkg-mac-amd64/clawbench/clawbench pkg-mac-amd64/clawbench/server.sh
          cd pkg-mac-amd64 && zip -r clawbench-darwin-amd64.zip clawbench/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            pkg-linux/clawbench-linux-amd64.zip
            pkg-windows/clawbench-windows-amd64.zip
            pkg-mac-arm64/clawbench-darwin-arm64.zip
            pkg-mac-amd64/clawbench-darwin-amd64.zip

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/clawbench.jks

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_FILE: ../clawbench.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            android/app/build/outputs/apk/release/clawbench-android.apk
