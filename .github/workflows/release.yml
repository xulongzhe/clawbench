name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-binary:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o clawbench-linux-amd64 ./cmd/server

      - uses: actions/upload-artifact@v4
        with:
          name: clawbench-linux-amd64
          path: clawbench-linux-amd64

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binary]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: clawbench-linux-amd64

      - name: Make binary executable
        run: chmod +x clawbench-linux-amd64

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: clawbench-linux-amd64
