name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Linux binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o clawbench-linux-amd64 ./cmd/server

      - name: Build Windows binary
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o clawbench-windows-amd64.exe ./cmd/server

      - name: Build macOS binary
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o clawbench-darwin-arm64 ./cmd/server

      - name: Package binaries
        run: |
          zip clawbench-linux-amd64.zip clawbench-linux-amd64
          zip clawbench-windows-amd64.zip clawbench-windows-amd64.exe
          zip clawbench-darwin-arm64.zip clawbench-darwin-arm64

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            clawbench-linux-amd64.zip
            clawbench-windows-amd64.zip
            clawbench-darwin-arm64.zip
