name: CI

on:
  push:
    branches: [main, feature/android-webview, feature/setup-wizard]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: Go build
        run: go build ./cmd/server

  coverage-go:
    name: Coverage Gate (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download main baseline
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v8
        with:
          workflow: ci.yml
          branch: main
          name: main-go-coverage
          path: .clawbench/baseline/
        continue-on-error: true

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run coverage gate check
        run: ./scripts/check-go-coverage.sh

      - name: Upload coverage profile
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: main-go-coverage
          path: coverage.out
          retention-days: 90

  coverage-frontend:
    name: Coverage Gate (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download main baseline
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v8
        with:
          workflow: ci.yml
          branch: main
          name: main-frontend-coverage
          path: .clawbench/baseline/
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run coverage gate check
        run: ./scripts/check-frontend-coverage.sh

      - name: Upload coverage data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: main-frontend-coverage
          path: |
            coverage/coverage-summary.json
            coverage/coverage-final.json
          retention-days: 90

  coverage-android:
    name: Coverage Gate (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download main baseline
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v8
        with:
          workflow: ci.yml
          branch: main
          name: main-android-coverage
          path: .clawbench/baseline/
        continue-on-error: true

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Run coverage gate check
        run: ./scripts/check-android-coverage.sh

      - name: Upload coverage data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: main-android-coverage
          path: android/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          retention-days: 90

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [coverage-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build debug APK
        working-directory: android
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          VERSION_NAME=$(git describe --tags --always 2>/dev/null || echo "dev")
          ./gradlew assembleDebug -PversionCode=$VERSION_CODE -PversionName=$VERSION_NAME

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build Go binary
        run: go build -o clawbench ./cmd/server

      - name: Build frontend
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test --config e2e/playwright.config.ts
        env:
          E2E_PORT: '20100'
          E2E_PASSWORD: 'e2e-test-password'

      - name: Generate E2E coverage report
        if: always()
        run: ./scripts/check-e2e-coverage.sh

      - name: Upload E2E coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage
          path: coverage/e2e/
          retention-days: 90

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7

  build-linux-package:
    name: Build Linux Package (with Pi)
    runs-on: ubuntu-latest
    needs: [test, coverage-go, coverage-frontend]
    if: github.ref == 'refs/heads/feature/setup-wizard'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Build frontend
        run: npm ci && npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Linux binary
        env:
          CGO_ENABLED: 1
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          go build -ldflags="-s -w -X clawbench/internal/version.Version=$VERSION" -o clawbench ./cmd/server

      - name: Verify Linux binary exists
        run: |
          file clawbench
          echo "✅ Linux binary built successfully"

      - name: Download Pi agent binary (Linux)
        run: |
          PI_VERSION="${PI_VERSION:-0.78.0}"
          mkdir -p .clawbench/pi
          curl -sL "https://github.com/earendil-works/pi/releases/download/v${PI_VERSION}/pi-linux-x64.tar.gz" | tar xzf - -C .clawbench/pi --strip-components=1
          chmod +x .clawbench/pi/pi
          echo "${PI_VERSION}" > .clawbench/pi/VERSION

      - name: Package
        run: |
          mkdir -p pkg/clawbench/.clawbench
          cp clawbench pkg/clawbench/clawbench
          cp -r public pkg/clawbench/public
          cp -r config pkg/clawbench/config
          cp -r .clawbench/pi pkg/clawbench/.clawbench/pi
          cp server.sh pkg/clawbench/
          chmod +x pkg/clawbench/clawbench pkg/clawbench/server.sh
          cd pkg && zip -r clawbench-linux-amd64.zip clawbench/

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawbench-linux-amd64
          path: pkg/clawbench-linux-amd64.zip
          retention-days: 7
