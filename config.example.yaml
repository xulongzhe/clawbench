  # summarize_backend: "mmx-cli"
  # summarize_model: "MiniMax-M2.7"
  # voice: "zh-CN-XiaoxiaoNeural"                       # Voice ID / 音色ID
  #                                                    #   Common Chinese / 常用中文: zh-CN-XiaoxiaoNeural, zh-CN-YunxiNeural, zh-CN-YunjianNeural
  #                                                    #   Common English / 常用英文: en-US-JennyNeural, en-US-GuyNeural
  #                                                    #   Full list / 完整列表: https://speech.microsoft.com/portal/voicegallery
  # speed: 1                                            # Speed multiplier; auto-converted to % rate (1.2 → +20%, 0.8 → -20%)
                                                       # 语速倍率，自动转换为百分比速率（1.2 → +20%，0.8 → -20%）

  # --- Combo 2: Edge TTS + Claude summarization (high quality, slower CLI startup) ---
  # --- 组合2: Edge TTS + Claude总结（高质量，CLI启动较慢） ---
