  # --- Combo 8: Ollama summarization (local inference, no cloud needed) ---
  # --- 组合8: Ollama总结（本地推理，无需云服务） ---
  # engine: "edge"
  # summarize_backend: "ollama"
  # summarize_model: "gemma3:270m"                       # Ollama model name (run ollama pull first / 需预先 ollama pull)
  # ollama:
  #   base_url: "http://localhost:11434"                  # Ollama API URL (default/默认: http://localhost:11434)
                                                          # Ollama API 地址（默认: http://localhost:11434）
  # voice: "zh-CN-XiaoxiaoNeural"
  # speed: 1
  #
  # Ollama installation / Ollama 安装步骤：
  #   1. Install Ollama / 安装 Ollama: https://ollama.com/download
  #   2. Pull model / 拉取模型: ollama pull gemma3:270m
  #   3. Ensure Ollama service is running (default: localhost:11434) / 确保 Ollama 服务运行中（默认监听 localhost:11434）

# Default agent (optional; leave empty to use the first agent in agents/ directory)
# 默认智能体（可选，留空则使用 agents/ 目录下的第一个智能体）
# Available agents depend on your agents/ directory / 可用智能体取决于 agents/ 目录
default_agent: "assistant"

# Logging configuration (optional) / 日志配置（可选）
# Default: .clawbench/logs under the binary directory / 默认：二进制同级目录下的 .clawbench/logs/
log_dir: ".clawbench/logs"
log_max_days: 7            # Log retention in days (default/默认: 7) / 日志保留天数，默认 7

# Port forwarding configuration (Android WebView accessing server local ports)
# 端口转发配置（Android WebView 访问服务器本地端口）
proxy:
  enabled: true             # Enable port forwarding / 启用端口转发代理
  allowed_ports: "1024-65535"  # Allowed port range (supports ranges and discrete ports, e.g. "3000,5173,8080")
                                # 允许转发的端口范围（支持范围和离散端口，如 "3000,5173,8080"）

# SSH tunnel configuration (remote development port forwarding)
# SSH 隧道配置（远程开发端口转发）
# Android app connects via SSH tunnel to access server local ports transparently
# Android App 通过 SSH 隧道访问服务器本地端口，对应用完全透明
ssh:
  enabled: true             # Enable SSH tunnel server / 启用 SSH 隧道服务
  port: 0                   # SSH port (0 = auto = main_port + 1, e.g. production 20001; or specify like 20020)
                            # SSH 端口（0 = 自动 = 主端口+1，如生产环境 20001；也可指定如 20020）
  host_key: ""              # Host key file path (empty = auto-generate ephemeral key; set a path for persistence across restarts)
                            # Host key 文件路径（空 = 自动生成临时密钥，重启后变更；建议指定路径以持久化）
