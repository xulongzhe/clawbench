# =============================================================================
# ClawBench Configuration Example / 配置示例
# =============================================================================
#
# Usage / 使用方法：
#   Linux/macOS:
#     1. Copy this file as config.yaml: cp config.example.yaml config.yaml
#        复制此文件为 config.yaml：cp config.example.yaml config.yaml
#     2. Modify values to match your environment
#        根据实际情况修改配置项
#     3. Start the server: ./server.sh
#        启动服务：./server.sh
#   Windows:
#     1. Copy this file as config.yaml: copy config.example.yaml config.yaml
#        复制此文件为 config.yaml：copy config.example.yaml config.yaml
#     2. Modify values to match your environment
#        根据实际情况修改配置项
#     3. Start the server: .\server.ps1
#        启动服务：.\server.ps1
# =============================================================================

# Server port / 服务端口
port: 20000

# Project root directory — the base path that AI agents can access for file operations.
# 项目监控目录（AI 可访问的文件根路径）
# Linux example / Linux 示例：/home/your-username
# macOS example / macOS 示例：/Users/your-username
# Windows example / Windows 示例：C:\Users\your-username
watch_dir: "/home/your-username"

# Access password (optional; leave empty to disable authentication).
# 访问密码（可选，留空则无需登录）
# It is strongly recommended to set a strong password for public deployments.
# 建议设置强密码保护服务安全。
password: "your-password-here"

# Upload limits / 文件上传限制
upload:
  max_size_mb: 100   # Maximum single file upload size in MB / 单文件上传大小上限（MB）
  max_files: 20      # Maximum number of files per upload / 单次上传文件数上限

# TLS (HTTPS) configuration / TLS (HTTPS) 配置
# Strongly recommended for public deployments / 公网部署时强烈建议启用 HTTPS
tls:
  enabled: false     # Enable HTTPS; requires cert_file and key_file when true / 启用后需配置证书路径
  # Linux/macOS example / Linux/macOS 示例：
  cert_file: "/path/to/fullchain.pem"   # Certificate file, e.g. Let's Encrypt / 证书文件，如 Let's Encrypt
  key_file: "/path/to/privkey.pem"      # Private key file / 私钥文件
  # Windows example / Windows 示例：
  # cert_file: "C:\certs\fullchain.pem"
  # key_file: "C:\certs\privkey.pem"

# Dev mode ports (separate from production to avoid conflicts)
# 开发模式端口（与生产环境隔离，避免冲突）
dev:
  port: 20002           # Dev backend port / 开发版后端端口
  frontend_port: 20001  # Vite frontend port (HMR hot reload) / Vite 前端端口（HMR 热更新）
  host: "localhost"     # Bind address: "0.0.0.0" allows public access, "localhost" restricts to local only
                        # 绑定地址："0.0.0.0" 允许公网访问，"localhost" 仅限本地

# Chat UI settings / 聊天界面设置
chat:
  initial_messages: 20    # Number of messages loaded initially / 初始加载的消息条数
  page_size: 20           # Number of messages per lazy-load batch / 每次懒加载追加的消息条数
  collapsed_height: 150   # Collapsed height for historical messages in pixels / 历史消息折叠高度（像素）
  # Quick-send presets — shown as a menu when the input bar is empty and the send button is tapped.
  # 快捷发送预设（输入框为空时，点击发送按钮弹出菜单选择）
  # Key: short label displayed in the menu (emoji allowed) / Key: 显示在菜单上的短标签（可带 emoji）
  # Value: the actual message text sent / Value: 实际发送的消息文本
  quick_send:
    "▶️ 继续": "继续"
    "👌 OK": "OK"
    "🔨 编译": "帮我编译当前项目，优先使用项目中已有的脚本。"
    "🔄 重启调试": "帮我重启当前项目的调试版本服务，优先使用项目中已经有的脚本。"
    "🚀 重启服务": "帮我重启当前项目的发布版本服务，优先使用项目中已经有的脚本。"
    "📦 提交": "提交"
    "👀 浏览变更": "工作区改了什么"
    "🗑️ 丢弃变更": "放弃工作区修改"

# Session limit / 会话数量限制
session:
  max_count: 10  # Maximum chat sessions per project; must delete old sessions when limit is reached
                  # 会话数量上限，默认10，达到上限后需删除旧会话才能创建新会话

# TTS (Text-to-Speech) configuration / 语音合成配置
# Supported engines / 支持四种引擎：
#   minimax — Cloud synthesis, best audio quality, requires mmx CLI and API quota (default)
#             云端合成，音质最佳，需要 mmx CLI 和 API 配额（默认）
#   edge    — Microsoft Edge TTS, free and unlimited, requires internet
#             微软 Edge TTS，免费无限制，需要网络
#   piper   — Local offline synthesis, extremely fast, requires piper binary + voice model
#             本地离线合成，无需网络，速度极快，需要安装 piper 二进制和语音模型
#   kokoro  — Local offline synthesis, excellent quality, requires Python + kokoro-onnx + ONNX model
#             本地离线合成，音质优秀，需要 Python + kokoro-onnx + ONNX 模型
tts:
  engine: "minimax"                                       # TTS engine / TTS引擎: "minimax" (default/默认), "edge", "piper", "kokoro"

  # --- Summarization backend (compresses AI replies into TTS-friendly summaries) ---
  # --- 总结后端（将AI回复压缩为适合朗读的摘要） ---
  # summarize_backend: which AI backend to use for summarization / 决定用哪个 AI 来做总结
  #   "mmx-cli"   — mmx text chat (default, lightweight & fast, requires mmx CLI)
  #                  使用 mmx text chat（默认，轻量快速，需要 mmx CLI）
  #   "claude"    — Claude CLI (high quality, higher startup overhead)
  #                  使用 Claude CLI（总结质量高，启动开销较大）
  #   "codebuddy" — CodeBuddy CLI / 使用 CodeBuddy CLI
  #   "gemini"    — Gemini CLI / 使用 Gemini CLI
  #   "opencode"  — OpenCode CLI / 使用 OpenCode CLI
  #   "codex"     — Codex CLI / 使用 Codex CLI
  #   "ollama"    — Ollama HTTP API (local inference, requires running Ollama service)
  #                  使用 Ollama HTTP API（本地推理，需要运行 Ollama 服务）
  summarize_backend: "mmx-cli"
  summarize_model: "MiniMax-M2.7"                        # Summarization model (leave empty for backend default;
                                                          # defaults: mmx-cli→MiniMax-M2.7, ollama→gemma3:270m,
                                                          # claude→claude-sonnet-4-6, codebuddy→glm-5.1,
                                                          # gemini→gemini-3-pro-preview, opencode→opencode/minimax-m2.5-free,
                                                          # codex→codex-MiniMax-M2.7)
                                                          # 总结模型（留空则使用后端默认）

  # --- Speed & Voice (shared across all engines) ---
  # --- 语速与音色（所有引擎共享） ---
  speed: 1                                             # Speed multiplier (1.0 = normal; edge auto-converts to % rate, e.g. 1.2 → +20%)
                                                       # 语速倍率（1.0=正常速度；edge 会转为百分比速率如 +0%）
  # voice: See engine-specific examples below / 见下方各引擎样例

  # ============================================================
  # TTS Engine + Summarization Backend Combination Examples
  # TTS引擎 + 总结后端 组合样例 —— 取消注释对应的一组即可
  # ============================================================

  # --- Combo 1: Edge TTS + mmx-cli summarization (default, free & unlimited) ---
  # --- 组合1: Edge TTS + mmx-cli总结（默认，免费无限制） ---
