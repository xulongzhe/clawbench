  #      Needed / 需要: onnx/model.onnx (rename to / 重命名为 kokoro-v1.1-zh.onnx)
  #                     voices/*.bin (convert to NPZ format / 需转换为 NPZ 格式的 voices-v1.1-zh.bin)
  #   3. Or use v1.0 English model / 或者使用 v1.0 英文模型: https://github.com/thewh1teagle/kokoro-onnx/releases
