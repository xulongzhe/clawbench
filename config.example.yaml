  # --- Combo 6: Piper (local offline, ultra-fast) ---
  # --- 组合6: Piper（本地离线，极速） ---
  # engine: "piper"
  # summarize_backend: "mmx-cli"
  # summarize_model: "MiniMax-M2.7"
  # voice: "zh_CN-huayan-medium"                        # Model name (without .onnx extension); auto-maps to .clawbench/piper-models/<voice>.onnx
                                                       # 模型名（不含.onnx扩展名），自动映射到 .clawbench/piper-models/<voice>.onnx
  #                                                    #   Available Chinese / 可用中文: zh_CN-huayan-medium, zh_CN-huayan-x_low, zh_CN-chaowen-medium
  #                                                    #   Available English / 可用英文: en_US-lessac-medium, en_US-libritts-high, etc.
  #                                                    #   Full list / 完整列表: https://github.com/rhasspy/piper/blob/master/VOICES.md
  # speed: 1                                            # Speed multiplier; auto-converted to length_scale = 1/speed (1.5 = 1.5x speed)
                                                       # 语速倍率，自动转换为 length_scale = 1/speed（1.5=1.5倍速）
  # piper:
  #   model_path: ""                                    # Absolute path to .onnx model; leave empty to use .clawbench/piper-models/<voice>.onnx
                                                       # 模型文件绝对路径，留空则使用 .clawbench/piper-models/<voice>.onnx
  #   noise_scale: 0.667                                # Sampling noise scale; higher = more variation (default/默认: 0.667, range/范围: 0.0-1.0)
                                                       # 采样噪声比例，越大变化越多（默认: 0.667，范围: 0.0-1.0）
  #   length_scale: 1.0                                 # Explicit speech rate; overrides speed conversion when set (lower = faster, 1.0 = normal, 0.5 = 2x)
                                                       # 语速调节，显式配置时优先于speed转换（越小越快，1.0=正常，0.5=2倍速）
  #   sentence_silence: 0.2                             # Silence between sentences in seconds (default/默认: 0.2)
                                                       # 句间停顿时长，单位秒（默认: 0.2）
  #
  # Piper installation / Piper 安装步骤：
  #   1. Download binary / 下载二进制: https://github.com/rhasspy/piper/releases (extract to .venv/piper/)
  #   2. Download model / 下载模型: https://hf-mirror.com/rhasspy/piper-voices (place in .clawbench/piper-models/)
  #      Two files needed / 需要两个文件: <model>.onnx and <model>.onnx.json

  # --- Combo 7: Kokoro (local offline, high-quality Chinese speech) ---
  # --- 组合7: Kokoro（本地离线，高质量中文语音） ---
  # engine: "kokoro"
  # summarize_backend: "mmx-cli"
  # summarize_model: "MiniMax-M2.7"
  # voice: "zf_001"                                    # Voice name / 音色名
  #                                                    #   v1.1 Chinese female / v1.1 中文女声: zf_001, zf_002, zf_003, ...
  #                                                    #   v1.1 Chinese male / v1.1 中文男声: zm_009, zm_010, zm_011, ...
  #                                                    #   v1.0 Chinese female / v1.0 中文女声: zf_xiaobei, zf_shanshan, zf_xiaoyi
  #                                                    #   v1.0 Chinese male / v1.0 中文男声: zm_yunxi, zm_yunjian
  #                                                    #   Full list / 完整列表: https://huggingface.co/onnx-community/Kokoro-82M-v1.1-zh-ONNX
  # speed: 1                                            # Speed multiplier (1.0 = normal, 1.5 = 1.5x speed) / 语速倍率（1.0=正常，1.5=1.5倍速）
  # kokoro:
  #   model_path: ""                                    # Model file path; leave empty to use .clawbench/kokoro-models/kokoro-v1.1-zh.onnx
                                                       # 模型文件路径，留空则使用 .clawbench/kokoro-models/kokoro-v1.1-zh.onnx
  #   voices_path: ""                                   # Voices file path; leave empty to use .clawbench/kokoro-models/voices-v1.1-zh.bin
                                                       # 音色文件路径，留空则使用 .clawbench/kokoro-models/voices-v1.1-zh.bin
  #   lang: "cmn"                                       # espeak language code (cmn = Mandarin Chinese, en-us = American English, default/默认: cmn)

  # --- Combo 8: MOSS-TTS-Nano (local offline, multilingual, voice cloning, 48kHz) ---
  # --- 组合8: MOSS-TTS-Nano（本地离线，多语言，音色克隆，48kHz） ---
  # engine: "moss-nano"
  # summarize_backend: "mmx-cli"
  # summarize_model: "MiniMax-M2.7"
  # moss_nano:
  #   model_dir: ""                                      # ONNX model directory; leave empty to auto-detect (.clawbench/moss-nano-models if present, otherwise CLI auto-downloads)
                                                        # ONNX模型目录；留空则自动检测（若 .clawbench/moss-nano-models 存在则使用，否则CLI首次运行自动下载）
  #   prompt_speech: ""                                  # Reference audio for voice cloning; leave empty for default voice (no cloning)
                                                        # 参考音频用于音色克隆，留空则使用默认音色（不克隆）
  #   backend: "onnx"                                    # Inference backend: "onnx" (default, CPU-friendly) or "pytorch" (requires GPU)
                                                       # 推理后端: "onnx"（默认，CPU可用）或 "pytorch"（需要GPU）
  #
  # MOSS-TTS-Nano features / MOSS-TTS-Nano 特性：
  #   - 0.1B parameters, runs on CPU / 0.1B参数，CPU即可运行
  #   - 48kHz stereo WAV output / 48kHz 立体声 WAV 输出
  #   - ~20 languages: zh, en, ja, ko, de, es, fr, it, ... / 约20种语言
  #   - Zero-shot voice cloning with reference audio / 零样本音色克隆（需参考音频）
  #   - ONNX runtime: ~2x faster than PyTorch / ONNX推理比PyTorch快约2倍
  #
  # MOSS-TTS-Nano installation / MOSS-TTS-Nano 安装步骤：
  #   conda create -n moss-tts-nano python=3.12 -y
  #   conda activate moss-tts-nano
  #   git clone https://github.com/OpenMOSS/MOSS-TTS-Nano.git
  #   cd MOSS-TTS-Nano && pip install -r requirements.txt && pip install -e .
  #   # Then ensure "moss-tts-nano" CLI is on $PATH or in .venv/bin/
                                                       # espeak语言代码（cmn=普通话，en-us=美式英语，默认: cmn）
