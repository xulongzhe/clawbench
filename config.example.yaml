  # summarize_backend: "claude"
  # summarize_model: "claude-sonnet-4-6"
  # voice: "zh-CN-XiaoxiaoNeural"
  # speed: 1

  # --- Combo 3: Edge TTS + Gemini summarization ---
  # --- 组合3: Edge TTS + Gemini总结 ---
  # engine: "edge"
  # summarize_backend: "gemini"
  # summarize_model: "gemini-3-pro-preview"
  # voice: "zh-CN-XiaoxiaoNeural"
  # speed: 1

  # --- Combo 4: MiniMax (cloud, best audio quality) ---
  # --- 组合4: MiniMax（云端，音质最佳） ---
  # engine: "minimax"
  # summarize_backend: "mmx-cli"
  # summarize_model: "MiniMax-M2.7"
  # voice: "female-chengshu"                            # Voice ID / 音色ID: female-chengshu, male-qn-qingse, etc. (default/默认: female-chengshu)
  # tts_model: "speech-2.8-hd"                          # TTS synthesis model / 语音合成模型（default/默认: "speech-2.8-hd"）
  # language: "zh"                                      # Language boost code / 语言增强代码: zh, en, ja, etc. (default/默认: "zh")
  # speed: 1.5                                          # Speed multiplier, recommended 1.0-2.0 (default/默认: 1.5)
                                                       # 语速倍率，推荐 1.0-2.0（默认: 1.5）
  # format: "mp3"                                       # Audio output format / 音频输出格式: mp3, wav, pcm, etc. (default/默认: "mp3")

  # --- Combo 5: MiniMax + CodeBuddy summarization ---
  # --- 组合5: MiniMax + CodeBuddy总结 ---
  # engine: "minimax"
  # summarize_backend: "codebuddy"
  # summarize_model: "glm-5.1"
  # voice: "female-chengshu"
  # tts_model: "speech-2.8-hd"
