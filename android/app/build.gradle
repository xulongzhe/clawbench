plugins {
    id 'com.android.application'
    id 'jacoco'
}

/**
 * Auto-generate versionName when not provided via -PversionName.
 * Format: dev.<branch>.<buildTime>.<gitShortHash>
 * Example: dev.main.20250729-143000.g830bb6c
 */
def autoVersionName() {
    if (project.hasProperty('versionName')) return project.property('versionName')
    try {
        def branch = 'git rev-parse --abbrev-ref HEAD'.execute([], rootDir).text.trim()
        def hash = 'git rev-parse --short HEAD'.execute([], rootDir).text.trim()
        def time = new Date().format('yyyyMMdd-HHmmss')
        // Sanitize branch name: replace non-alphanumeric chars with dash
        branch = branch.replaceAll('[^a-zA-Z0-9._-]', '-')
        return "dev.${branch}.${time}.${hash}"
    } catch (Exception e) {
        return "dev"
    }
}

android {
    namespace 'com.clawbench.app'
    compileSdk 36

    defaultConfig {
        applicationId "com.clawbench.app"
        minSdk 24
        targetSdk 34
        versionCode (project.hasProperty('versionCode') ? project.property('versionCode').toInteger() : 1)
        versionName autoVersionName()

        // JPush manifest placeholders (AppKey set at runtime via JPushConfig)
        manifestPlaceholders = [
            JPUSH_PKGNAME: applicationId,
            JPUSH_APPKEY: "",
            JPUSH_CHANNEL: "developer-default"
        ]
    }

    signingConfigs {
        release {
            // CI: read from environment variables; Local: fallback to keystore file
            def keystoreFile = System.getenv("KEYSTORE_FILE")
            storeFile keystoreFile ? file(keystoreFile) : file('../clawbench.jks')
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: 'clawbench123'
            keyAlias System.getenv("KEY_ALIAS") ?: 'clawbench'
            keyPassword System.getenv("KEY_PASSWORD") ?: 'clawbench123'
        }
    }

    applicationVariants.all { variant ->
        // Debug: use different applicationId so it can coexist with release
        if (variant.buildType.name == "debug") {
            variant.outputs.all { output ->
                outputFileName = "clawbench-android-debug.apk"
            }
        }
        if (variant.buildType.name == "release") {
            variant.outputs.all { output ->
                outputFileName = "clawbench-android.apk"
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
        debug {
            minifyEnabled false
            debuggable true
            testCoverageEnabled true
            applicationIdSuffix ".debug"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    testOptions {
        unitTests {
            includeAndroidResources = true
            returnDefaultValues = true
            all {
                jvmArgs '--add-opens', 'java.base/sun.misc=ALL-UNNAMED'
            }
        }
    }
}

dependencies {
    implementation 'androidx.core:core:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'com.github.mwiede:jsch:0.2.16'
    implementation 'cn.jiguang.sdk:jpush:6.1.0'
    implementation 'cn.jiguang.sdk:jcore:5.4.0'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'

    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.robolectric:robolectric:4.11.1'
    testImplementation 'org.mockito:mockito-core:5.8.0'
    testImplementation 'com.squareup.okhttp3:mockwebserver:4.12.0'
    testImplementation 'androidx.test:core:1.5.0'
    testImplementation 'androidx.test.ext:junit:1.1.5'
    // Real org.json implementation for unit tests (android.jar stubs return defaults with returnDefaultValues=true)
    testImplementation 'org.json:json:20231013'
}

tasks.register('jacocoTestReport', JacocoReport) {
    dependsOn 'testDebugUnitTest'
    reports {
        xml.required = true
        html.required = true
    }
    def excludes = [
        '**/R.class', '**/R$*.class', '**/BuildConfig.*',
        '**/Manifest*.*'
    ]
    classDirectories.setFrom(files([
        fileTree(dir: "$buildDir/intermediates/javac/debug/classes",
                 excludes: excludes)
    ]))
    sourceDirectories.setFrom(files(['app/src/main/java']))
    executionData.setFrom(files(["$buildDir/outputs/unit_test_code_coverage/debugUnitTest/testDebugUnitTest.exec"]))
}
